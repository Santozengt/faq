<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档正在准备中</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f0f4f8; color: #2d3748; line-height: 1.6; }

        /* 顶部搜索横幅 */
        .search-banner {
            background: linear-gradient(135deg, #1e3a5f, #2c5282);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 4px 12px rgba(30, 58, 95, 0.3);
        }
        .search-banner .banner-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-banner h1 {
            font-size: 1.8rem;
            font-weight: 500;
        }
        .search-container {
            position: relative;
            width: 320px;
        }
        .search-input {
            width: 100%;
            padding: 10px 36px 10px 16px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem;
            opacity: 0.6;
            line-height: 1;
        }

        /* 面包屑导航 */
        .breadcrumb { max-width: 1400px; margin: 15px auto 0; padding: 0 20px; font-size: 0.85rem; color: #718096; }
        .breadcrumb a { color: #4299e1; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; color: #2b6cb0; }
        .breadcrumb span { margin: 0 8px; color: #cbd5e0; }

        /* 主体布局 */
        .main-wrapper { max-width: 1400px; margin: 40px auto 60px; padding: 0 20px; }

        /* 内容区域 */
        .content-area { 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 10px; 
            padding: 60px 40px; 
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .content-area h1 {
            font-size: 1.5rem;
            color: #1a202c;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .content-area p {
            font-size: 1rem;
            color: #718096;
            margin-bottom: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 24px;
            background: linear-gradient(135deg, #2c5282, #3182ce);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.25s;
            box-shadow: 0 2px 8px rgba(44, 82, 130, 0.3);
        }

        .back-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(44, 82, 130, 0.4);
        }

        .info-box {
            background: #f7fafc;
            border-left: 4px solid #3182ce;
            padding: 16px 20px;
            margin-top: 30px;
            text-align: left;
            border-radius: 0 6px 6px 0;
        }

        .info-box h3 {
            font-size: 0.95rem;
            color: #2d3748;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .info-box ul {
            list-style: none;
            padding: 0;
            font-size: 0.9rem;
            color: #4a5568;
        }

        .info-box li {
            padding: 6px 0;
            padding-left: 16px;
            position: relative;
        }

        .info-box li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            background: #3182ce;
            border-radius: 50%;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .search-banner { padding: 15px 20px; }
            .search-banner .banner-content { flex-direction: column; gap: 15px; }
            .search-container { width: 100%; }
            .breadcrumb { display: none; }
            .main-wrapper { margin: 20px auto 80px; }
            .content-area { padding: 40px 20px; }
            .content-area h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <div class="search-banner">
        <div class="banner-content">
            <h1>知识库</h1>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="搜索文档..." id="searchInput">
                <span class="search-icon">Search</span>
            </div>
        </div>
    </div>

    <div class="breadcrumb">
        <a href="index.html">首页</a>
        <span>&rsaquo;</span>
        <span>文档准备中</span>
    </div>

    <div class="main-wrapper">
        <main class="content-area">
            <div class="empty-icon">📋</div>
            <h1>本文档正在准备中</h1>
            <p>抱歉，您访问的文档目前正在编写或更新中。我们会尽快完成内容整理，感谢您的理解与耐心等待。</p>
            
            <a href="index.html" class="back-btn">返回知识库首页</a>

            <div class="info-box">
                <h3>您可以：</h3>
                <ul>
                    <li>浏览其他已完善的文档获取帮助</li>
                    <li>通过搜索功能查找相关内容</li>
                    <li>联系技术支持获取直接帮助</li>
                </ul>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') {
                window.location.href = 'index.html#search=' + encodeURIComponent(this.value);
            }
        });
    </script>

</body>
</html>
