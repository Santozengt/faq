<!DOCTYPE html>

    <title>服务支持 - 知识库服务中心</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f5f7fa; color: #333; }
        
        /* 顶部搜索区域 */
        .search-banner { background: linear-gradient(135deg, #1f2937, #111827); color: white; padding: 60px 20px; text-align: center; }
        .search-banner h1 { font-size: 2rem; margin-bottom: 15px; font-weight: 500; }
        .search-box { max-width: 600px; margin: 0 auto; display: flex; background: white; border-radius: 4px; overflow: hidden; }
        .search-box input { flex: 1; border: none; padding: 14px 20px; font-size: 1rem; outline: none; }
        .search-box button { background-color: #c7000b; color: white; border: none; padding: 0 30px; font-size: 1rem; cursor: pointer; }
        
        /* 主体内容布局 */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-title { font-size: 1.5rem; margin-bottom: 20px; color: #111827; border-left: 4px solid #c7000b; padding-left: 10px; }
        
        /* 分类网格 */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .category-card { background: white; border: 1px solid #e5e7eb; border-radius: 4px; padding: 24px; transition: box-shadow 0.2s; }
        .category-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .category-card h3 { font-size: 1.2rem; margin-bottom: 15px; color: #1f2937; border-bottom: 1px solid #f3f4f6; padding-bottom: 10px; }
        
        /* 文档列表链接 */
        .doc-list { list-style: none; }
        .doc-list li { margin-bottom: 12px; }
        .doc-list a { color: #2563eb; text-decoration: none; font-size: 0.95rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .doc-list a:hover { color: #c7000b; text-decoration: underline; }
    </style>
</head>
